name: Fork Build

on:
  push:
    branches: [ci]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -C debuginfo=line-tables-only

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup || true
          docker system prune -af || true
          df -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libsecret-1-dev xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"
          shared-key: fork-build-x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # The fork has no TAURI_SIGNING_PRIVATE_KEY, so updater artifacts are turned off here.
      - name: Build Tauri app
        run: >
          pnpm tauri build
          --target x86_64-unknown-linux-gnu
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dbx-linux-x86_64
          if-no-files-found: error
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
